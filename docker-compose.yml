services:
  backend:
    build:
      context: ./backend
    container_name: marketlens-backend
    environment:
      DATABASE_URL: sqlite:////app/data/marketlens.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: marketlens-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend_data:
