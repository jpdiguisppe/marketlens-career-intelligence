name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Apply security hardening preview
        id: hardening
        run: |
          set +e
          python .github/scripts/apply_m7_security_hardening.py > hardening-output.txt 2>&1
          status=$?
          cat hardening-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload hardening diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m7-security-hardening-diagnostics
          path: hardening-output.txt

      - name: Stop on hardening failure
        if: steps.hardening.outputs.status != '0'
        run: exit 1

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: m7-security-hardened-source
          path: |
            backend/app/external_urls.py
            backend/app/job_search.py
            backend/app/job_source_registry.py
            backend/app/main.py
            backend/app/saved_jobs.py
            backend/app/saved_reports.py
            backend/tests/test_external_security.py
            backend/tests/test_job_source_registry.py
            frontend/src/App.tsx
            frontend/src/SafeExternalLink.tsx
            frontend/src/SavedJobs.tsx
            frontend/src/SavedReports.tsx
            frontend/src/security.ts
            docs/milestone-7-source-registry.md

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker builds
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t marketlens-backend ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost:8000 -t marketlens-frontend ./frontend
