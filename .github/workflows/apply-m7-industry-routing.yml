name: Apply Milestone 7 Industry Routing

on:
  push:
    branches: [milestone-7-industry-aware-routing]

permissions:
  contents: write

jobs:
  apply-routing:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out routing branch
        uses: actions/checkout@v4
        with:
          ref: milestone-7-industry-aware-routing
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply routing integration
        run: python .github/scripts/apply_m7_industry_routing.py

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Commit validated routing integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/job_search.py backend/tests/test_job_search_routing_integration.py
          if git diff --cached --quiet; then
            echo "Routing integration already applied."
            exit 0
          fi
          git commit -m "Integrate industry-aware source routing"
          git push origin HEAD:milestone-7-industry-aware-routing
