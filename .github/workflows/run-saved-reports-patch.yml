name: Run saved reports patch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: milestone-6-saved-smart-fit-reports
          fetch-depth: 0

      - name: Execute saved reports implementation
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/apply-saved-smart-fit-reports.yml').read_text()
          marker = "          python - <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY\n", 1)[0]
          exec(compile(dedent(script), 'saved-reports-patch', 'exec'))
          PY

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit saved reports
        run: |
          rm -f .github/saved-reports-trigger.txt
          rm -f .github/workflows/run-saved-reports-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add private saved Smart Fit reports"
          git push origin milestone-6-saved-smart-fit-reports
