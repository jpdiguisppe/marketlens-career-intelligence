name: Capture sports search test output

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/sports-industry-search
          fetch-depth: 0

      - name: Apply patch in runner
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/apply-sports-industry-search.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Run backend tests"
          body = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines())
          exec(compile(script, 'sports-search-patch', 'exec'))
          PY

      - name: Capture focused test output
        working-directory: backend
        run: |
          python -m pip install -q -r requirements.txt
          set +e
          python -m pytest -q tests/test_job_search.py > ../sports-test-output.txt 2>&1
          status=$?
          echo "exit_status=$status" >> ../sports-test-output.txt
          exit 0

      - name: Commit diagnostic output
        run: |
          rm .github/workflows/capture-sports-test-output.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sports-test-output.txt .github/workflows/capture-sports-test-output.yml
          git commit -m "Capture sports search test output"
          git push origin feature/sports-industry-search
