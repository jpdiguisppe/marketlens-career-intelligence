name: Apply Milestone 7 source registry

on:
  push:
    branches:
      - milestone-7-source-registry

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: milestone-7-source-registry
          fetch-depth: 0

      - name: Apply source registry changes
        run: python .github/scripts/apply_m7_source_registry.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit source registry
        run: |
          rm -f .github/scripts/apply_m7_source_registry.py
          rm -f .github/workflows/apply-m7-source-registry.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add configurable job source registry"
          git push origin milestone-7-source-registry
