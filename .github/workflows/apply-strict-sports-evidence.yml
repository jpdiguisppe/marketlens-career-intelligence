name: Apply strict sports industry evidence patch

on:
  push:
    branches:
      - fix/strict-sports-industry-evidence

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/strict-sports-industry-evidence
          fetch-depth: 0

      - name: Tighten sports-industry evidence
        run: |
          python - <<'PY'
          from pathlib import Path

          job_search_path = Path("backend/app/job_search.py")
          text = job_search_path.read_text()

          old_constants = '''SPORTS_TITLE_OR_COMPANY_TERMS = {
              "sport",
              "sports",
              "athletic",
              "athletics",
              "esports",
              "e-sports",
              "league",
              "stadium",
              "arena",
              "sportsbook",
              "collegiate athletics",
              "sports media",
          }
          SPORTS_DESCRIPTION_TERMS = {
              "sport",
              "sports",
              "athletic department",
              "athletics program",
              "collegiate athletics",
              "professional league",
              "professional team",
              "fan engagement",
              "game day",
              "gameday",
              "ticket sales",
              "ticketing",
              "sponsorship activation",
              "sponsorships",
              "sports media",
              "sports marketing",
              "sports broadcast",
              "sports broadcasting",
              "stadium",
              "arena",
              "athlete",
              "athletes",
              "esports",
              "e-sports",
              "sportsbook",
          }
          '''
          new_constants = '''SPORTS_TITLE_OR_COMPANY_TERMS = {
              "sport",
              "sports",
              "athletic",
              "athletics",
              "esports",
              "e-sports",
              "sportsbook",
              "sports media",
              "major league",
              "minor league",
              "football club",
              "soccer club",
              "basketball club",
              "baseball club",
              "hockey club",
          }
          SPORTS_DESCRIPTION_STRONG_PHRASES = {
              "sports organization",
              "sports organisation",
              "professional sports organization",
              "professional sports organisation",
              "professional sports team",
              "professional sports league",
              "sports team",
              "sports league",
              "sports club",
              "athletic department",
              "athletics program",
              "collegiate athletics",
              "college athletics",
              "sports media company",
              "sports network",
              "sports broadcaster",
              "sports marketing agency",
              "sports agency",
              "stadium operations",
              "arena operations",
          }
          SPORTS_DESCRIPTION_ANCHOR_TERMS = {
              "sport",
              "sports",
              "athletic",
              "athletics",
              "esports",
              "e-sports",
          }
          SPORTS_DESCRIPTION_SIGNAL_GROUPS = (
              {"fan engagement", "fan experience", "fan growth", "fan base"},
              {"game day", "gameday", "match day", "matchday"},
              {"ticket sales", "ticketing", "season tickets"},
              {"stadium", "arena", "ballpark", "venue operations"},
              {"athlete", "athletes", "player relations", "player marketing"},
              {"sports media", "sports broadcast", "sports broadcasting", "live sports"},
              {"sponsorship activation", "sports partnerships", "partnership activation"},
          )
          '''
          assert old_constants in text, "sports constants block changed"
          text = text.replace(old_constants, new_constants, 1)

          old_matcher = '''def _matches_requested_industry(
              title: str,
              description: str,
              query: str,
              company: str | None = None,
          ) -> bool:
              industry = _query_industry(query)
              if industry is None:
                  return True

              if industry == "sports":
                  title_and_company = f"{title} {company or ''}".lower()
                  if _contains_any(title_and_company, SPORTS_TITLE_OR_COMPANY_TERMS):
                      return True
                  return _contains_any(description.lower(), SPORTS_DESCRIPTION_TERMS)

              return True
          '''
          new_matcher = '''def _sports_title_or_company_matches(title: str, company: str | None = None) -> bool:
              title_and_company = f"{title} {company or ''}".lower()
              return _contains_any(title_and_company, SPORTS_TITLE_OR_COMPANY_TERMS)


          def _sports_description_evidence_score(description: str) -> int:
              normalized = description.lower()
              if _contains_any(normalized, SPORTS_DESCRIPTION_STRONG_PHRASES):
                  return 3

              if not _contains_any(normalized, SPORTS_DESCRIPTION_ANCHOR_TERMS):
                  return 0

              signal_groups = sum(
                  1 for terms in SPORTS_DESCRIPTION_SIGNAL_GROUPS if _contains_any(normalized, terms)
              )
              return 3 if signal_groups >= 3 else signal_groups


          def _matches_requested_industry(
              title: str,
              description: str,
              query: str,
              company: str | None = None,
          ) -> bool:
              industry = _query_industry(query)
              if industry is None:
                  return True

              if industry == "sports":
                  if _sports_title_or_company_matches(title, company=company):
                      return True
                  return _sports_description_evidence_score(description) >= 3

              return True
          '''
          assert old_matcher in text, "sports matcher block changed"
          text = text.replace(old_matcher, new_matcher, 1)

          old_bonus = '''    if industry == "sports":
                  title_and_company = f"{title} {company or ''}".lower()
                  score += 10 if _contains_any(title_and_company, SPORTS_TITLE_OR_COMPANY_TERMS) else 6
          '''
          new_bonus = '''    if industry == "sports":
                  score += 10 if _sports_title_or_company_matches(title, company=company) else 6
          '''
          assert old_bonus in text, "sports score bonus block changed"
          text = text.replace(old_bonus, new_bonus, 1)

          job_search_path.write_text(text)

          tests_path = Path("backend/tests/test_job_search.py")
          tests = tests_path.read_text()
          test_block = '''

          def test_sports_search_rejects_incidental_sports_mentions() -> None:
              assert _score_job(
                  title="Product Marketing Manager, Prediction Markets",
                  description="Own prediction-market campaigns spanning sports, politics, crypto, and culture.",
                  query="sports marketing",
                  company="Coinbase",
              ) == 0

              assert _score_job(
                  title="Brand Manager",
                  description="Grow an ultra-premium tequila brand through sports sponsorships and athlete ambassadors.",
                  query="sports marketing",
                  company="Cazcanes Tequila",
              ) == 0


          def test_sports_description_requires_multiple_operational_signals_without_org_phrase() -> None:
              assert _score_job(
                  title="Social Media Coordinator",
                  description="Create live sports game-day content, grow fan engagement, and support ticketing campaigns.",
                  query="sports social media",
              ) > 0
          '''
          assert "def test_sports_search_rejects_incidental_sports_mentions" not in tests
          tests_path.write_text(tests.rstrip() + "\n" + test_block.lstrip())

          Path(".github/workflows/apply-strict-sports-evidence.yml").unlink()
          PY

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest

      - name: Commit strict sports filtering
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/job_search.py backend/tests/test_job_search.py .github/workflows/apply-strict-sports-evidence.yml
          git commit -m "Require strong sports industry evidence"
          git push origin fix/strict-sports-industry-evidence
