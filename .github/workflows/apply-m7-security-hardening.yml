name: Apply Milestone 7 security hardening

on:
  push:
    branches:
      - milestone-7-source-registry

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out source-registry branch
        uses: actions/checkout@v4
        with:
          ref: milestone-7-source-registry
          fetch-depth: 0

      - name: Apply security hardening
        run: python .github/scripts/apply_m7_security_hardening.py

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit validated hardening
        run: |
          rm -f .github/scripts/apply_m7_security_hardening.py
          rm -f .github/workflows/apply-m7-security-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden external job source handling"
          git push origin milestone-7-source-registry
