name: Fix sports patch workflow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/sports-industry-search
          fetch-depth: 0

      - name: Update patch workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/apply-sports-industry-search.yml')
          text = path.read_text()

          start = text.index('          old_role_signature =')
          end = text.index('          old_score_signature =', start)
          text = text[:start] + text[end:]

          old_call = '              if not _matches_requested_role(title, description, query, resolved_level, company=company):\n                  return 0\n'
          new_call = '              if not _matches_requested_industry(title, description, query, company=company):\n                  return 0\n              if not _matches_requested_role(title, description, query, resolved_level):\n                  return 0\n'
          assert old_call in text
          text = text.replace(old_call, new_call, 1)

          old_cleanup = '''          workflow_path = Path(".github/workflows/apply-sports-industry-search.yml")
          workflow_path.unlink()
          '''
          new_cleanup = '''          cleanup_paths = [
              Path(".github/workflows/apply-sports-industry-search.yml"),
              Path(".github/workflows/debug-sports-industry-search.yml"),
              Path("sports-test-output.txt"),
          ]
          for cleanup_path in cleanup_paths:
              if cleanup_path.exists():
                  cleanup_path.unlink()
          '''
          assert old_cleanup in text
          text = text.replace(old_cleanup, new_cleanup, 1)

          old_add = '          git add backend/app/job_search.py backend/tests/test_job_search.py .github/workflows/apply-sports-industry-search.yml\n'
          new_add = '          git add -A backend/app/job_search.py backend/tests/test_job_search.py .github/workflows/apply-sports-industry-search.yml .github/workflows/debug-sports-industry-search.yml sports-test-output.txt\n'
          assert old_add in text
          text = text.replace(old_add, new_add, 1)

          path.write_text(text)
          Path('.github/workflows/fix-sports-patch-workflow.yml').unlink()
          PY

      - name: Commit workflow fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-sports-industry-search.yml .github/workflows/fix-sports-patch-workflow.yml
          git commit -m "Fix sports search patch workflow"
          git push origin feature/sports-industry-search
