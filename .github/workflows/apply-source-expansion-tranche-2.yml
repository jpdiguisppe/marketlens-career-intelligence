name: Apply Milestone 7 Source Expansion Tranche 2

on:
  push:
    branches:
      - milestone-7-source-expansion-tranche-2

permissions:
  contents: write

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: milestone-7-source-expansion-tranche-2
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply source expansion
        run: python .github/scripts/apply_source_expansion_tranche_2.py

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Commit clean implementation
        run: |
          rm .github/scripts/apply_source_expansion_tranche_2.py
          rm .github/workflows/apply-source-expansion-tranche-2.yml
          rm -f .github/source-expansion-tranche-2-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Expand industry-specific job source coverage"
          git push origin HEAD:milestone-7-source-expansion-tranche-2
