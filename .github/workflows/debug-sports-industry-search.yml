name: Debug sports industry search patch

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/sports-industry-search

      - name: Apply patch script in the runner
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-sports-industry-search.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Run backend tests"
          body = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines())
          exec(compile(script, 'sports-search-patch', 'exec'))
          PY

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -q -r requirements.txt

      - name: Run focused job-search tests
        working-directory: backend
        run: python -m pytest -q tests/test_job_search.py
