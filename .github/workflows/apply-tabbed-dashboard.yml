name: Apply tabbed dashboard

on:
  push:
    branches:
      - milestone-6-tabbed-dashboard

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: milestone-6-tabbed-dashboard
          fetch-depth: 0

      - name: Apply tabbed dashboard changes
        run: python .github/scripts/apply_tabbed_dashboard.py

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit tabbed dashboard
        run: |
          rm -f .github/scripts/apply_tabbed_dashboard.py
          rm -f .github/workflows/apply-tabbed-dashboard.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add tabbed MarketLens dashboard"
          git push origin milestone-6-tabbed-dashboard
